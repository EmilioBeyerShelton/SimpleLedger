<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ledger</title>
<style>
  :root {
    --bg: #f6f5f2;
    --panel: #ffffff;
    --ink: #1e1e1e;
    --muted: #6b6b6b;
    --line: #dedad2;
    --accent: #2f5d50;
    --accent-soft: #e7efec;
    --danger: #a33;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100%;
  }
  #app { min-height: 100%; }

  h1 { font-size: 18px; margin: 0 0 4px; letter-spacing: 0.2px; }
  h2 { font-size: 15px; margin: 0; }
  h3 { font-size: 12px; margin: 0; }

  button {
    font: inherit;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    cursor: pointer;
    color: var(--ink);
  }
  button:hover { background: var(--accent-soft); border-color: var(--accent); }
  button.small { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
  button.ghost { background: transparent; border-color: transparent; color: var(--muted); }
  button.ghost:hover { background: var(--accent-soft); color: var(--ink); border-color: var(--line); }
  button.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.accent:hover { background: #244b40; }
  button.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  button.primary:hover { background: #000; }
  button.danger { color: var(--danger); border-color: var(--danger); background: #fff; }
  button.danger:hover { background: #fbeaea; }

  input, select, textarea {
    font: inherit;
    font-size: 14px;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  /* ---------- App shell ---------- */
  .app-shell {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    max-width: 640px;
    margin: 0 auto;
  }
  .main-content {
    flex: 1;
    padding: 16px 16px 90px;
  }
  .loading-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: var(--muted);
    font-size: 14px;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 16px;
    flex-wrap: wrap;
  }
  .topbar h1 { margin: 0; }
  .file-status-group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .file-status-group .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--line);
  }
  .file-status-group.state-connected .dot { background: #2f8f5b; }
  .file-status-group.state-reconnect .dot { background: #c98a1f; }
  .file-status-group.state-error .dot { background: var(--danger); }
  .file-status-group .fs-msg { font-size: 12px; color: var(--muted); }
  .file-status-group .fs-msg b { color: var(--ink); }
  .file-input-hidden { display: none; }

  /* ---------- Settings ---------- */
  .settings-section { display: flex; flex-direction: column; gap: 8px; }
  .settings-heading { text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-top: 4px; }
  .settings-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .settings-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ---------- Views ---------- */
  .view { display: flex; flex-direction: column; gap: 14px; }
  .view-title { font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  .view-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .view-head .view-title { margin: 0; }
  .view-sub { font-size: 12.5px; color: var(--muted); margin: -8px 0 0; line-height: 1.4; }
  .view-sub code { font-family: var(--mono); background: var(--accent-soft); padding: 1px 4px; border-radius: 4px; }
  .empty-note { color: var(--muted); font-size: 13px; }

  .search-filter-row { display: flex; gap: 8px; align-items: stretch; }
  .search-input { flex: 1; }
  .icon-btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    flex-shrink: 0;
    font-size: 17px;
    padding: 0;
    border-radius: 8px;
    background: #fff;
    border: 1px solid var(--line);
    color: var(--muted);
  }
  .icon-btn:hover { background: var(--accent-soft); border-color: var(--accent); }
  .icon-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .filter-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    line-height: 1;
    padding: 3px 5px;
    border-radius: 999px;
    min-width: 15px;
    text-align: center;
  }

  /* ---------- Expense form ---------- */
  .expense-form {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .form-row { display: flex; flex-direction: column; gap: 5px; }
  .form-row label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .more-toggle { align-self: flex-start; }
  .more-options { display: flex; flex-direction: column; gap: 12px; padding-top: 2px; }
  .form-error { font-size: 12.5px; color: var(--danger); }
  .form-actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .form-actions-right { display: flex; gap: 8px; }

  .split-box {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--accent-soft);
  }
  .split-box-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
  }
  .split-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .split-row.excluded { opacity: 0.5; }
  .split-member {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .split-amount { width: 90px; text-align: right; }

  .account-picker { position: relative; }
  .account-picker-list {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 4px);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    max-height: 220px;
    overflow-y: auto;
    z-index: 30;
  }
  .account-picker-option {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    padding: 8px 10px;
    cursor: pointer;
  }
  .account-picker-option:hover, .account-picker-option.selected { background: var(--accent-soft); }
  .account-picker-clear { border-bottom: 1px solid var(--line); font-style: italic; }
  .account-picker-clear .account-picker-title { font-weight: 500; color: var(--muted); }
  .account-picker-title { font-size: 13px; font-weight: 600; white-space: nowrap; }
  .account-picker-id { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .account-picker-empty { padding: 8px 10px; font-size: 12.5px; color: var(--muted); }

  /* ---------- History ---------- */
  .expense-list { display: flex; flex-direction: column; gap: 3px; }
  .expense-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 10px;
    cursor: pointer;
  }
  .expense-row:hover { border-color: var(--accent); }
  .expense-row-title { font-size: 13px; font-weight: 600; line-height: 1.25; }
  .expense-row-meta { font-size: 10.5px; color: var(--muted); margin-top: 1px; line-height: 1.25; }
  .expense-row-amount { font-family: var(--mono); font-size: 13px; white-space: nowrap; }
  .chip {
    font-size: 10.5px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 1px 7px;
  }

  .date-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0 2px;
  }
  .date-divider:first-child { margin-top: 2px; }
  .date-divider span {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    white-space: nowrap;
  }
  .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .day-divider {
    font-size: 10px;
    color: var(--muted);
    margin: 7px 0 2px 2px;
  }

  /* ---------- Accounts ---------- */
  .account-list { display: flex; flex-direction: column; gap: 6px; }
  .account-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
  }
  .account-row:hover { border-color: var(--accent); }
  .default-star { width: 16px; text-align: center; color: #c98a1f; font-size: 13px; flex-shrink: 0; }
  .account-row-fields { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .account-title { font-weight: 600; font-size: 13.5px; }
  .account-id { font-family: var(--mono); font-size: 11.5px; color: var(--muted); }
  .account-balance { font-family: var(--mono); font-size: 13px; white-space: nowrap; }
  .account-balance.negative { color: var(--danger); }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ink);
  }
  .checkbox-row input { width: auto; }

  /* ---------- Report ---------- */
  .report-controls {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  .pie-wrap {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 20px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
  }
  .pie-svg { width: 180px; height: 180px; flex-shrink: 0; }
  .pie-legend { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
  .pie-legend-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .pie-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .pie-legend-label { flex: 1; font-family: var(--mono); font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pie-legend-value { color: var(--muted); white-space: nowrap; }
  .pie-center-label { font-size: 10px; fill: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .pie-center-value { font-size: 15px; fill: var(--ink); font-family: var(--mono); font-weight: 600; }

  .chart-type-toggle { display: flex; gap: 6px; }

  .sankey-wrap {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    overflow-x: auto;
  }
  .sankey-svg { width: 100%; min-width: 560px; height: auto; display: block; }
  .sankey-label { font-size: 11px; fill: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .sankey-value { font-size: 9.5px; fill: var(--muted); font-family: var(--mono); }

  .inline-add-form {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .inline-add-form.column { flex-direction: column; align-items: stretch; }
  .inline-add-form input, .inline-add-form select { flex: 1; min-width: 120px; }

  /* ---------- Budgets ---------- */
  .group-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .group-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    cursor: pointer;
  }
  .group-card-title { font-size: 14px; font-weight: 600; }
  .group-card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .group-spent-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12.5px;
    color: var(--muted);
  }
  .group-spent-amount { font-family: var(--mono); font-size: 14px; color: var(--ink); font-weight: 600; }

  .budget-bar-wrap { display: flex; flex-direction: column; gap: 3px; }
  .budget-bar-track {
    height: 7px;
    border-radius: 999px;
    background: var(--accent-soft);
    overflow: hidden;
  }
  .budget-bar-fill { height: 100%; background: var(--accent); border-radius: 999px; }
  .budget-bar-fill.over { background: var(--danger); }
  .budget-bar-label { font-size: 11px; color: var(--muted); }
  .budget-bar-label.over { color: var(--danger); }
  .budget-none-row { display: flex; }
  .budget-inline-input { font-size: 12.5px; padding: 6px 8px; }

  .group-totals { display: flex; flex-direction: column; gap: 4px; }
  .group-total-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-family: var(--mono);
    background: var(--accent-soft);
    border-radius: 6px;
    padding: 4px 8px;
  }
  .group-expenses {
    border-top: 1px solid var(--line);
    padding-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .group-expense-row {
    display: flex;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--muted);
  }


  /* ---------- Modal ---------- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(30, 30, 30, 0.45);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
    overflow-y: auto;
    z-index: 50;
  }
  .modal {
    background: var(--panel);
    border-radius: 12px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    border: 1px solid var(--line);
  }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
  }
  .modal-body { padding: 14px 16px; }

  /* ---------- Nav (bottom tab bar on mobile, top tab row on desktop) ---------- */
  .topbar { order: 0; }
  .main-content { order: 2; }
  .bottom-nav {
    order: 3;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    background: var(--panel);
    border-top: 1px solid var(--line);
    padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
    max-width: 640px;
    margin: 0 auto;
    z-index: 40;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    border: none;
    background: transparent;
    color: var(--muted);
    padding: 7px 2px;
    border-radius: 8px;
  }
  .nav-btn:hover { background: var(--accent-soft); }
  .nav-btn.active { color: var(--accent); background: var(--accent-soft); }
  .nav-btn.active .nav-label { font-weight: 700; }
  .nav-icon { font-size: 17px; line-height: 1; }
  .nav-label { font-size: 10.5px; }

  @media (min-width: 720px) {
    .app-shell { max-width: 760px; }
    .bottom-nav {
      order: 1;
      position: static;
      max-width: none;
      margin: 0;
      justify-content: center;
      gap: 6px;
      padding: 4px 16px 12px;
      border-top: none;
      border-bottom: 1px solid var(--line);
    }
    .nav-btn {
      flex: 0 0 auto;
      flex-direction: row;
      gap: 7px;
      padding: 8px 16px;
    }
    .nav-icon { font-size: 15px; }
    .nav-label { font-size: 12.5px; }
    .main-content { padding-bottom: 24px; }
    .toast { bottom: 24px; }
  }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    bottom: 78px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    font-size: 12.5px;
    padding: 8px 14px;
    border-radius: 999px;
    z-index: 60;
    box-shadow: 0 6px 16px rgba(0,0,0,0.2);
  }

  @media (min-width: 480px) {
    .app-shell { border-left: 1px solid var(--line); border-right: 1px solid var(--line); min-height: 100vh; }
  }
</style>
</head>
<body>
  <div id="app"></div>

  <!-- Preact + htm from CDN as classic (non-module) UMD builds. Regular
       <script src> tags aren't subject to the CORS check that blocks
       type="module" imports on file://, so this works when you just
       double-click index.html — no local server needed. -->
  <script src="https://unpkg.com/preact@10.19.3/dist/preact.min.js"></script>
  <script src="https://unpkg.com/preact@10.19.3/hooks/dist/hooks.umd.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>

  <!-- App code, also classic scripts, loaded in dependency order. -->
  <script src="./js/lib.js?v=8"></script>
  <script src="./js/utils.js?v=18"></script>
  <script src="./js/store.js?v=18"></script>
  <script src="./js/components/Modal.js?v=8"></script>
  <script src="./js/components/TopBar.js?v=8"></script>
  <script src="./js/components/BottomNav.js?v=18"></script>
  <script src="./js/components/AccountPicker.js?v=14"></script>
  <script src="./js/components/ExpenseForm.js?v=18"></script>
  <script src="./js/components/HistoryView.js?v=18"></script>
  <script src="./js/components/AccountForm.js?v=8"></script>
  <script src="./js/components/AccountsView.js?v=8"></script>
  <script src="./js/components/BudgetsView.js?v=18"></script>
  <script src="./js/components/SettingsView.js?v=8"></script>
  <script src="./js/components/PieChart.js?v=13"></script>
  <script src="./js/components/SankeyChart.js?v=12"></script>
  <script src="./js/components/ReportView.js?v=9"></script>
  <script src="./js/app.js?v=18"></script>
</body>
</html>
